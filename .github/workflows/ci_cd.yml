name: MCP API CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:

  # =========================
  # CI PIPELINE (TESTING)
  # =========================
  ci_pipeline:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"   # 🔥 speed improvement

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Basic environment check
      run: |
        python -c "import sys; print('Python Version:', sys.version)"

    - name: Run pytest (strict mode)
      run: |
        pytest tests/ -v --disable-warnings --maxfail=1

  # =========================
  # CD PIPELINE (BUILD + RUN)
  # =========================
  cd_pipeline:
    needs: ci_pipeline
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Build
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        docker build -t mcp-api-agent:latest .

    - name: Run container (health check)
      run: |
        docker run -d -p 5000:5000 --name mcp_test mcp-api-agent:latest
        sleep 5
        docker ps
        docker logs mcp_test

    - name: Stop container
      run: |
        docker stop mcp_test
        docker rm mcp_test

    - name: Final runtime validation
      run: |
        python -c "print('CD pipeline completed successfully')"